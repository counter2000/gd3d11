name: 'Create release'

inputs:
  token:
    description: "GitHub token"
    required: true
  nightly:
    description: "Boolean string ('true'/'false')"
    required: true
  artifact-id:
    description: "ID of the artifact that contains files for deployment"
    required: true

runs:
  using: composite
  steps:
    - name: Download build artifact
      id: download-artifact
      uses: actions/download-artifact@v7
      with:
        artifact-ids: ${{ inputs.artifact-id }}

    - name: Delete old nightly
      if: ${{ inputs.nightly == 'true' }}
      shell: bash
      run: |
        gh release delete nightly --yes --cleanup-tag || echo "No nightly release found to delete"
      env:
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Create nightly release
      if: ${{ inputs.nightly == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        asset="$(find "${{ steps.download-artifact.outputs.download-path }}" -maxdepth 1 -name '*.zip' -print -quit)"
        if [[ -z "$asset" ]]; then
          echo "No release zip found in ${{ steps.download-artifact.outputs.download-path }}" >&2
          exit 1
        fi

        gh release create nightly "$asset" \
          --target "$GITHUB_SHA" \
          --title "Nightly" \
          --prerelease \
          --generate-notes
      env:
        GH_TOKEN: ${{ inputs.token }}

    - name: Create regular release
      if: ${{ inputs.nightly != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        asset="$(find "${{ steps.download-artifact.outputs.download-path }}" -maxdepth 1 -name '*.zip' -print -quit)"
        if [[ -z "$asset" ]]; then
          echo "No release zip found in ${{ steps.download-artifact.outputs.download-path }}" >&2
          exit 1
        fi

        if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
          gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
        else
          gh release create "$GITHUB_REF_NAME" "$asset" --generate-notes
        fi
      env:
        GH_TOKEN: ${{ inputs.token }}
